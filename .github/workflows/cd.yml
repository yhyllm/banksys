name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP=banksys
            DEPLOY_DIR=/opt/banksys
            PORT=8000
            PORT_MAX=8010

            # Clone or pull latest code
            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd $DEPLOY_DIR
              git pull
            else
              git clone git@github.com:yhyllm/banksys.git $DEPLOY_DIR
              cd $DEPLOY_DIR
            fi

            # Build Docker image
            docker build -t $APP:latest .

            # Find available port
            port_in_use() {
              ss -ltnH 2>/dev/null | grep -q ":$1 " && return 0
              docker ps --format "{{.Ports}}" 2>/dev/null | grep -q ":$1->" && return 0
              return 1
            }

            HOST_PORT=""
            for p in $(seq $PORT $PORT_MAX); do
              if ! port_in_use "$p"; then HOST_PORT="$p"; break; fi
            done
            [ -z "$HOST_PORT" ] && { echo "All ports $PORT-$PORT_MAX occupied, abort"; exit 1; }
            echo ">> Deploying to host port $HOST_PORT"

            # Stop & remove old container, then start new one
            docker rm -f $APP 2>/dev/null || true
            docker run -d --name $APP --restart unless-stopped -p ${HOST_PORT}:8000 $APP:latest

            sleep 3

            # Health check
            curl -fsS "http://localhost:${HOST_PORT}/health"
            echo ">> Deploy OK: http://${{ secrets.SSH_HOST }}:${HOST_PORT}/health"
