name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Rsync code to server
        run: |
          rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
            --exclude='.git' \
            --exclude='models/' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/banksys/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP=banksys
            DEPLOY_DIR=/opt/banksys
            cd $DEPLOY_DIR

            # Stop & remove old container first (free port 8000)
            docker rm -f $APP 2>/dev/null || true

            # Build Docker image
            docker build \
              --build-arg PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple \
              -t $APP:latest .

            # Start new container
            docker run -d --name $APP --restart unless-stopped \
              -p 8000:8000 \
              -p 8050:8050 \
              $APP:latest

            sleep 5

            # Health check
            curl -fsS "http://localhost:8000/health"
            echo ">> API:    http://${{ secrets.SSH_HOST }}:8000/docs"
            echo ">> Frontend: http://${{ secrets.SSH_HOST }}:8050"
